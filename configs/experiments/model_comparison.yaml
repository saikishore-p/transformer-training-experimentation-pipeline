# Model comparison sweep — DistilBERT vs DistilRoBERTa on same task/data
# Compares two architectures under identical training conditions.
# Run with: uv run python scripts/run_sweep.py --sweep configs/experiments/model_comparison.yaml

- model:
    type: huggingface
    name: distilbert-base-uncased
  training:
    learning_rate: 2.0e-5
    batch_size: 16
    epochs: 3
    seed: 42
  data:
    dataset_name: ag_news
    max_length: 128
    subsample_train: 2000
    subsample_val: 400
  experiment:
    name: model_cmp_distilbert
    output_dir: checkpoints
    mlflow_tracking_uri: mlruns
    mlflow_experiment_name: model-comparison

- model:
    type: huggingface
    name: distilroberta-base
  training:
    learning_rate: 2.0e-5
    batch_size: 16
    epochs: 3
    seed: 42
  data:
    dataset_name: ag_news
    max_length: 128
    subsample_train: 2000
    subsample_val: 400
  experiment:
    name: model_cmp_distilroberta
    output_dir: checkpoints
    mlflow_tracking_uri: mlruns
    mlflow_experiment_name: model-comparison
