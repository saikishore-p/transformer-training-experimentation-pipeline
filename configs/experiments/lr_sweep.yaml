# Learning rate sweep — 4 runs varying lr, all other params fixed
# Run with: uv run python scripts/run_sweep.py --sweep configs/experiments/lr_sweep.yaml

- model:
    type: huggingface
    name: distilbert-base-uncased
  training:
    learning_rate: 1.0e-5
    batch_size: 16
    epochs: 3
    seed: 42
  data:
    dataset_name: ag_news
    max_length: 128
    subsample_train: 2000
    subsample_val: 400
  experiment:
    name: lr_sweep_1e5
    output_dir: checkpoints
    mlflow_tracking_uri: sqlite:///mlflow.db
    mlflow_experiment_name: lr-sweep

